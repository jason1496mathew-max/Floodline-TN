# Floodline TN - Render Configuration
services:
  - type: web
    name: floodline-tn-api
    env: python
    region: singapore
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python scripts/generate_mock_data.py
      python scripts/process_geojson.py
      python scripts/generate_vulnerability_data.py
      python scripts/generate_taluk_vulnerability.py
      python models/train.py
      python scripts/generate_district_predictions.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: USE_MOCK_DATA
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://floodline-tn.netlify.app,http://localhost:3000
