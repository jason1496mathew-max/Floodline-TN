# Floodline TN - Netlify Configuration

[build]
  base = "dashboard/"
  command = "npm run build"
  publish = "dist/"

[build.environment]
  NODE_VERSION = "18.17.0"
  VITE_API_BASE_URL = "https://floodline-tn-api.onrender.com/api/v1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
